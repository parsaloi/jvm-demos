# Default logging level (Options: trace, debug, info, warn, error)
org.slf4j.simpleLogger.defaultLogLevel=info

# Show the current thread name in the log output
org.slf4j.simpleLogger.showThreadName=true

# Show the logger name
org.slf4j.simpleLogger.showLogName=true

# Show short logger name
org.slf4j.simpleLogger.showShortLogName=true

# Enclose the log level in brackets [INFO]
org.slf4j.simpleLogger.levelInBrackets=true

# Include the current date and time
org.slf4j.simpleLogger.showDateTime=true

# Format for the date and time (standard ISO 8601)
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
